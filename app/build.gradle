plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.drivermate.ph'
    compileSdk 35

    defaultConfig {
        applicationId 'com.drivermate.ph'
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName '1.1'
    }

    buildFeatures {
        buildConfig true
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.15.0'
}
